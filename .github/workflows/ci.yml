name: ci
on: [push, pull_request]
jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -e portal/backend
      - run: python -m compileall portal/backend/app connectors
      - run: cd portal/backend && pytest
      - uses: actions/setup-node@v4
        with: {node-version: '22'}
      - run: cd portal/frontend && npm install && npm test && npm run build
      - run: docker build portal/backend && docker build portal/frontend
