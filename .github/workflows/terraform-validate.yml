name: terraform-validate
on: [push, pull_request]
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=terraform/envs/lab fmt -check -recursive
      - run: terraform -chdir=terraform/envs/lab init -backend=false
      - run: terraform -chdir=terraform/envs/lab validate
